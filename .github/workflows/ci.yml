name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest --cov=eval_harness --cov-report=term-missing

  smoke-action:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run example suite via CLI
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          eval-harness run --suite examples/suite.yaml --out head.json
          eval-harness diff --suite examples/suite.yaml --head head.json --out diff.json
          eval-harness comment --diff diff.json --out comment.md --head-sha "$GITHUB_SHA"
          cat comment.md
